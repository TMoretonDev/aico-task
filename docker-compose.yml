services:
  aico-task-db:
    image: 'postgres:18'

    ports:
      - 5433:5432

    environment:
      POSTGRES_USER: aico
      POSTGRES_PASSWORD: aicopassword
      POSTGRES_DB: aicodb

    volumes:
      - aico_task_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aico -d aicodb']
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  aico_task_db_data:
