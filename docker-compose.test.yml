services:
  aico-task-db-test:
    image: 'postgres:18'

    ports:
      - 5434:5432

    environment:
      POSTGRES_USER: aico
      POSTGRES_PASSWORD: aicopassword
      POSTGRES_DB: aico_task_db_test

    tmpfs:
      - /var/lib/postgresql

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aico -d aico_task_db_test']
      interval: 2s
      timeout: 2s
      retries: 20
